<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Presenter</title>
    <!-- Using FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Using PDF.js v2 for maximum local file:// compatibility without CORS/module issues -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- WebRTC PeerJS for OBS Dock <-> Source communication -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1e1e1e; color: #fff; 
            display: flex; height: 100vh; overflow: hidden; 
        }
        
        /* Layout */
        #preview-panel { flex: 1; display: flex; flex-direction: column; background: #2d2d2d; min-width: 0; }
        #sidebar { width: 250px; background: #252526; border-right: 1px solid #3e3e42; display: flex; flex-direction: column; }
        
        /* Sidebar Styling */
        .sidebar-top { padding: 15px; border-bottom: 1px solid #3e3e42; }
        .btn-group { display: flex; gap: 10px; }
        .btn { 
            flex: 1; padding: 10px; border: none; border-radius: 6px; 
            cursor: pointer; font-size: 14px; font-weight: 600; 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            color: #fff; transition: background 0.2s; 
        }
        .btn-upload { background: #0078d4; }
        .btn-upload:hover { background: #005a9e; }
        .btn-view { background: #2ea043; }
        .btn-view:hover { background: #238636; }
        
        .material-list-container { flex: 1; overflow-y: auto; padding: 15px; }
        .section-title { font-size: 12px; text-transform: uppercase; color: #a1a1a1; margin-bottom: 10px; font-weight: 600; letter-spacing: 0.5px; }
        .material-list { list-style: none; margin: 0; padding: 0; }
        .material-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px; background: #333333; margin-bottom: 8px; 
            border-radius: 6px; cursor: pointer; border: 1px solid transparent; 
            transition: all 0.2s; 
        }
        .material-item:hover { background: #3e3e42; border-color: #555; }
        .material-item.active { background: #094771; border-color: #0078d4; }
        
        .material-name { display: flex; align-items: center; gap: 10px; overflow: hidden; flex: 1; }
        .material-name i { font-size: 16px; color: #a1a1a1; width: 20px; text-align: center; }
        .material-item.active .material-name i { color: #fff; }
        
        /* Truncate long text */
        .material-text { 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            font-size: 14px; max-width: 190px;
        }
        
        .btn-delete { 
            background: none; border: none; color: #f85149; 
            cursor: pointer; padding: 6px; border-radius: 4px; 
            transition: background 0.2s; display: flex; align-items: center; justify-content: center; 
        }
        .btn-delete:hover { background: rgba(248, 81, 73, 0.15); }
        
        /* Preview Panel Styling */
        .preview-toolbar { 
            padding: 15px; background: #1e1e1e; display: flex; align-items: center; 
            justify-content: center; gap: 20px; border-bottom: 1px solid #3e3e42; 
        }
        .preview-toolbar button { 
            background: #333; color: white; border: 1px solid #555; 
            padding: 8px 20px; border-radius: 4px; cursor: pointer; 
            font-size: 14px; display: flex; align-items: center; gap: 8px; transition: background 0.2s; 
        }
        .preview-toolbar button:hover:not(:disabled) { background: #444; border-color: #666; }
        .preview-toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
        #slide-indicator { font-size: 14px; font-weight: 600; min-width: 100px; text-align: center; color: #ccc; }
        
        .preview-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; min-height: 0; min-width: 0; overflow: hidden; }
        canvas { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background-color: #fff; border-radius: 4px; }
        
        .empty-state { color: #666; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .empty-state i { font-size: 48px; }
        .empty-state p { font-size: 16px; margin: 0; }

        #file-input { display: none; }
        
        body.drag-over::after {
            content: "Lepas file di sini!";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 120, 212, 0.9);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            z-index: 9999;
            pointer-events: none;
            border: 4px dashed #fff;
        }
    </style>
</head>
<body>

    <!-- Left side: Sidebar (Menu) -->
    <div id="sidebar">
        <div class="sidebar-top">
            <div class="btn-group">
                <button class="btn btn-upload" onclick="triggerUpload()" title="Upload Materi">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </button>
                <button class="btn btn-view" onclick="openView()" title="Buka Viewer">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
            <input type="file" id="file-input" multiple>
        </div>
        <div class="material-list-container">
            <ul class="material-list" id="material-list">
                <!-- Material items will be injected here via JS -->
            </ul>
        </div>
        <div style="padding: 10px 15px; font-size: 12px; border-top: 1px solid #3e3e42; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <div id="peer-status-dot" style="width: 10px; height: 10px; border-radius: 50%; background: #f85149;"></div>
            <span id="peer-status-text" style="color: #ccc;">Sinyal Offline</span>
        </div>
    </div>

    <!-- Right side: Preview Panel -->
    <div id="preview-panel">
        <div class="preview-toolbar">
            <button id="btn-prev" onclick="prevSlide()" disabled><i class="fa-solid fa-chevron-left"></i> Prev</button>
            <div id="slide-indicator">- / -</div>
            <button id="btn-next" onclick="nextSlide()" disabled>Next <i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <div class="preview-content" id="preview-content">
            <div class="empty-state" id="empty-state">
                <i class="fa-solid fa-display"></i>
                <p>Pilih materi di samping untuk mulai</p>
            </div>
            <canvas id="preview-canvas" style="display: none;"></canvas>
        </div>
    </div>

    <script>
        // Set worker source for PDF.js (Using CDN to avoid local module CORS issues)
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let materials = [];
        let currentMaterialId = null;
        let currentPdfDoc = null;
        let currentPageNum = 1;
        let totalPages = 1;
        let isRendering = false;
        let pageNumPending = null;

        const fileInput = document.getElementById('file-input');
        const materialList = document.getElementById('material-list');
        const previewCanvas = document.getElementById('preview-canvas');
        const ctx = previewCanvas.getContext('2d', { alpha: false }); // alpha: false mempercepat performa render browser
        
        // Setup BroadcastChannel for fallback OBS Dock <-> Source communication
        const obsChannel = new BroadcastChannel('obs_presenter_channel');

        // Setup WebRTC (PeerJS) for OBS Dock <-> Source over internet
        const peerStatusDot = document.getElementById('peer-status-dot');
        const peerStatusText = document.getElementById('peer-status-text');
        
        const peer = new Peer('obs-admin-rizki-99887766'); // Static ID for the Dock Server
        let viewers = []; // Array of connected viewers

        function updatePeerStatus(status, color) {
            peerStatusText.innerText = status;
            peerStatusDot.style.background = color;
        }

        peer.on('open', () => {
            updatePeerStatus("Server Aktif. Menunggu Layar...", "#e3b341");
        });

        peer.on('connection', (conn) => {
            viewers.push(conn);
            updatePeerStatus(`${viewers.length} Layar Terhubung`, "#2ea043");
            
            conn.on('open', () => {
                // Sync current state to the newly connected viewer
                if (previewCanvas.style.display === 'block') {
                    const dataUrl = previewCanvas.toDataURL('image/jpeg', 0.85);
                    conn.send({ type: 'slide', image: dataUrl });
                } else {
                    conn.send({ type: 'clear' });
                }
            });

            conn.on('close', () => {
                viewers = viewers.filter(c => c !== conn);
                if (viewers.length === 0) {
                    updatePeerStatus("Server Aktif. Menunggu Layar...", "#e3b341");
                } else {
                    updatePeerStatus(`${viewers.length} Layar Terhubung`, "#2ea043");
                }
            });
            
            conn.on('error', () => {
                viewers = viewers.filter(c => c !== conn);
            });
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                updatePeerStatus("Error: Dock Lain Sedang Aktif!", "#f85149");
            } else if (err.type === 'network' || err.type === 'disconnected') {
                updatePeerStatus("Sinyal Terputus...", "#f85149");
                setTimeout(() => { if (!peer.destroyed) peer.reconnect(); }, 3000);
            } else {
                updatePeerStatus(`Error Sinyal: ${err.type}`, "#f85149");
            }
        });

        peer.on('disconnected', () => {
            updatePeerStatus("Internet Terputus...", "#f85149");
            setTimeout(() => { if (!peer.destroyed) peer.reconnect(); }, 3000);
        });
        
        // Offscreen canvas for double buffering (prevents white flash)
        const offscreenCanvas = document.createElement('canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d', { alpha: false });
        
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const slideIndicator = document.getElementById('slide-indicator');
        const emptyState = document.getElementById('empty-state');

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function triggerUpload() {
            fileInput.click();
        }

        // Core function to process files (from both click and drag-drop)
        function handleFiles(files) {
            for(let file of files) {
                const isPdf = file.type.includes('pdf') || file.name.toLowerCase().endsWith('.pdf');
                const isImage = file.type.includes('image') || file.name.toLowerCase().match(/\.(jpg|jpeg|png|webp)$/);
                
                if (!isPdf && !isImage) {
                    alert(`Format file tidak didukung: ${file.name}\nHarap upload file PDF atau Gambar.`);
                    continue;
                }

                const material = {
                    id: generateId(),
                    name: file.name,
                    file: file,
                    type: isPdf ? 'pdf' : 'image'
                };
                materials.push(material);
            }
            renderMaterialList();
        }

        // 1. Handle regular file upload button
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = ''; // Reset input
        });

        // 2. Handle Drag & Drop to bypass OBS security restrictions
        const body = document.body;
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            body.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            body.addEventListener(eventName, () => body.classList.add('drag-over'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            body.addEventListener(eventName, () => body.classList.remove('drag-over'), false);
        });

        body.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        // Render the list of uploaded materials in sidebar
        function renderMaterialList() {
            materialList.innerHTML = '';
            materials.forEach(mat => {
                const li = document.createElement('li');
                li.className = `material-item ${mat.id === currentMaterialId ? 'active' : ''}`;
                
                const icon = mat.type === 'pdf' ? 'fa-file-pdf' : 'fa-image';
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'material-name';
                nameDiv.innerHTML = `<i class="fa-solid ${icon}"></i> <span class="material-text" title="${mat.name}">${mat.name}</span>`;
                
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.title = "Hapus";
                delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
                delBtn.onclick = (e) => {
                    e.stopPropagation(); // Prevent triggering selection
                    deleteMaterial(mat.id);
                };

                li.onclick = () => selectMaterial(mat.id);
                
                li.appendChild(nameDiv);
                li.appendChild(delBtn);
                materialList.appendChild(li);
            });
        }

        // Delete a material
        function deleteMaterial(id) {
            materials = materials.filter(m => m.id !== id);
            if(currentMaterialId === id) {
                currentMaterialId = null;
                clearPreview();
            }
            renderMaterialList();
        }

        // Clear the canvas and reset states
        function clearPreview() {
            emptyState.style.display = 'flex';
            previewCanvas.style.display = 'none';
            ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            slideIndicator.innerText = `- / -`;
            btnPrev.disabled = true;
            btnNext.disabled = true;
            localStorage.removeItem('obs_slide'); // Fallback for normal browser
            obsChannel.postMessage({ type: 'clear' }); // Local clear signal
            
            // WebRTC Clear
            viewers.forEach(conn => {
                if (conn.open) conn.send({ type: 'clear' });
            });
        }

        // Select and render a material
        async function selectMaterial(id) {
            currentMaterialId = id;
            renderMaterialList();
            
            const mat = materials.find(m => m.id === id);
            if(!mat) return;

            emptyState.style.display = 'none';
            previewCanvas.style.display = 'block';

            if(mat.type === 'pdf') {
                const arrayBuffer = await mat.file.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument({data: arrayBuffer});
                currentPdfDoc = await loadingTask.promise;
                totalPages = currentPdfDoc.numPages;
                currentPageNum = 1;
                renderPage(currentPageNum);
            } else {
                currentPdfDoc = null;
                totalPages = 1;
                currentPageNum = 1;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        previewCanvas.width = img.width;
                        previewCanvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        updateToolbar();
                        broadcastCanvas();
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(mat.file);
            }
        }

        // Render a specific PDF page
        function renderPage(num) {
            if(!currentPdfDoc) return;
            
            if(isRendering) {
                pageNumPending = num;
                return;
            }
            
            isRendering = true;
            
            currentPdfDoc.getPage(num).then(page => {
                // Optimal Scale: Target lebar 1920px (1080p) agar tidak boros RAM/CPU seperti fixed scale 2.5
                const unscaledViewport = page.getViewport({scale: 1.0});
                const scale = Math.min(1920 / unscaledViewport.width, 2.0); 
                const viewport = page.getViewport({scale: scale});
                
                offscreenCanvas.width = viewport.width;
                offscreenCanvas.height = viewport.height;
                
                // Beri background putih agar PDF tidak transparan/hitam
                offscreenCtx.fillStyle = "white";
                offscreenCtx.fillRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
                
                const renderContext = {
                    canvasContext: offscreenCtx,
                    viewport: viewport
                };
                
                const renderTask = page.render(renderContext);
                renderTask.promise.then(() => {
                    // Swap offscreen canvas to main canvas to avoid white flash
                    previewCanvas.width = offscreenCanvas.width;
                    previewCanvas.height = offscreenCanvas.height;
                    ctx.drawImage(offscreenCanvas, 0, 0);

                    isRendering = false;
                    updateToolbar();
                    broadcastCanvas();
                    
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });
        }

        function updateToolbar() {
            slideIndicator.innerText = `Slide ${currentPageNum} / ${totalPages}`;
            btnPrev.disabled = currentPageNum <= 1;
            btnNext.disabled = currentPageNum >= totalPages;
        }

        function prevSlide() {
            if(currentPageNum <= 1) return;
            currentPageNum--;
            renderPage(currentPageNum);
        }

        function nextSlide() {
            if(currentPageNum >= totalPages) return;
            currentPageNum++;
            renderPage(currentPageNum);
        }

        // Keyboard arrow controls
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' || e.key === 'PageDown') nextSlide();
            if(e.key === 'ArrowLeft' || e.key === 'PageUp') prevSlide();
        });

        // Broadcast current canvas image to the viewer window via localStorage
        function broadcastCanvas() {
            // Menggunakan format WebP 80% ukuran filenya jauh lebih kecil & lebih cepat dikirim via internet dibanding JPEG
            const dataUrl = previewCanvas.toDataURL('image/webp', 0.80);
            localStorage.setItem('obs_slide', dataUrl); // Fallback for normal browsers
            obsChannel.postMessage({ type: 'slide', image: dataUrl }); // For local fallback
            
            // Send via WebRTC for OBS Browser Source
            viewers.forEach(conn => {
                if (conn.open) conn.send({ type: 'slide', image: dataUrl });
            });
        }

        // Open the View window
        function openView() {
            window.open('view.html', 'obs_viewer', 'width=1280,height=720');
        }
        
        // Initial clean state
        clearPreview();
    </script>
</body>
</html>
